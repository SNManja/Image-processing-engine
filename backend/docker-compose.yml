services:
    postgres:
        image: postgres:16
        container_name: image-processing-engine-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: app
            POSTGRES_PASSWORD: app
            POSTGRES_DB: presets
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./db:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U app -d presets"]
            interval: 2s
            timeout: 2s
            retries: 30

    web:
        build:
            context: .
            target: dev
        env_file:
            - .env.development
        ports:
            - "5500:5500"
        volumes:
            - ./src:/app/src
        depends_on:
            postgres:
                condition: service_healthy

volumes:
    postgres-data:
