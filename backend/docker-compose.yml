services:
    postgres:
        image: postgres:16
        container_name: image-processing-engine-db
        restart: unless-stopped
        env_file:
            - .env
        environment:
            POSTGRES_USER: app
            POSTGRES_PASSWORD: app
            POSTGRES_DB: presets
            PORT: 5432
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./db:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U app -d presets"]
            interval: 5s
            timeout: 3s
            retries: 10

    web:
        build: .
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        env_file:
            - .env
        ports:
            - "${PORT}:${PORT}"

volumes:
    postgres-data:
