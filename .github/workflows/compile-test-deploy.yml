name: Compile, run test and deploy

permissions:
    contents: read
    checks: write
on:
    pull_request:
        paths-ignore:
            - "**/*.md"
            - "docs/**"
    push:
        branches: ["main"]
        paths-ignore:
            - "**/*.md"
            - "docs/**"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build_native:
        name: "Native Build"
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - run: make build

            - name: Upload native build
              uses: actions/upload-artifact@v4
              with:
                  name: native-build
                  path: build/

    run-test:
        name: "Test suite"
        runs-on: ubuntu-latest
        needs: build_native
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Download native build
              uses: actions/download-artifact@v4
              with:
                  name: native-build
                  path: native-build/

            - name: Run Tests (JUnit)
              run: |
                  ls -la native-build || true
                  test -f ./native-build/imgengine_tests
                  chmod +x ./native-build/imgengine_tests
                  mkdir -p tests/test_output
                  ./native-build/imgengine_tests -r junit -o native-build/test-results.xml

            - name: Publish test report
              uses: dorny/test-reporter@v1
              if: always()
              with:
                  name: Catch2 Tests
                  path: native-build/test-results.xml
                  reporter: java-junit
                  fail-on-error: true

            - name: Upload test artifacts
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-artifacts
                  path: |
                      native-build/test-results.xml
                      tests/test_output/

    build_wasm:
        name: "WASM Build"
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
            - run: npm ci
            - name: Verify npm install
              run: |
                  echo "PWD=$(pwd)"
                  ls -la
                  test -f package-lock.json && echo "FOUND package-lock.json" || (echo "MISSING package-lock.json" && exit 1)
                  node -p "require('./package-lock.json').name"
                  node -p "require('./package-lock.json').packages[''].devDependencies"
                  ls -la node_modules/tailwindcss node_modules/@tailwindcss/cli
                  npx --no-install @tailwindcss/cli --help >/dev/null
            - uses: mymindstorm/setup-emsdk@v14
            - run: make dist

            - name: Upload WASM artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wasm-binaries
                  path: backend/dist/
